// ── HttpBridge 초기화 ──

  window.HttpBridge._fail=id=>{window.HttpBridge._cb[id]&&(window.HttpBridge._cb[id](null),delete window.HttpBridge._cb[id]);};
}

async function nativeGet(url){
  if(window.HttpBridge){
    return new Promise((res,rej)=>{
      const id='r'+Date.now()+Math.random().toString(36).slice(2,6);
      window.HttpBridge._cb[id]=d=>d?res(JSON.parse(d)):rej(new Error('fetch fail'));
      window.HttpBridge.get(url,id);
    });
  }
  return fetch(url,{headers:{'User-Agent':'Mozilla/5.0'}}).then(r=>r.json());
}

function classifyTags(name,sector,per,marketCap,type){
  const tags=[];
  const nm=(name||'').toLowerCase();
  const sc=(sector||'').toLowerCase();
  const exportKW=['반도체','전자','디스플레이','자동차','조선','화학','배터리','이차전지','소프트웨어','통신장비','기계','철강','에너지','반도체','equipment','semiconductor','tech','chip'];
  const domKW=['은행','금융','통신','유통','소매','음식료','건설','부동산','의료','보험','pharmaceutical','healthcare','retail','bank'];
  if(exportKW.some(k=>sc.includes(k)||nm.includes(k)))tags.push('수출주');
  if(domKW.some(k=>sc.includes(k)||nm.includes(k)))tags.push('내수주');
  if(type==='kr'&&marketCap){const c=typeof marketCap==='string'?parseInt(marketCap.replace(/[^0-9]/g,'')):marketCap;if(c>=1e12)tags.push('대형주');else if(c<5e11)tags.push('소형주');}
  else if(type==='us'&&marketCap){if(marketCap>=10e9)tags.push('대형주');else if(marketCap<2e9)tags.push('소형주');}
  if(per>0&&per<15)tags.push('가치주');else if(!per||per>30)tags.push('성장주');
  return tags.length?tags:['성장주'];
}

}

// ── 계산 ──
function calc(){
  const EX=portfolio.exRate;
  const kr=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.cur,0);
  const us=portfolio.holdings.us.reduce((s,h)=>s+h.qty*h.cur*EX,0);
  const bn=portfolio.holdings.bonds.reduce((s,h)=>s+h.qty*(h.curKRW||0),0);
  const go=portfolio.holdings.gold.reduce((s,h)=>s+h.qty*h.cur,0);
  const cr=portfolio.holdings.crypto.reduce((s,h)=>s+h.qty*h.cur,0);
  const cost=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.avg,0)
    +portfolio.holdings.us.reduce((s,h)=>s+h.qty*h.avg*EX,0)
    +portfolio.holdings.bonds.reduce((s,h)=>s+h.qty*(h.avgKRW||0),0)
    +portfolio.holdings.gold.reduce((s,h)=>s+h.qty*h.avg,0)
    +portfolio.holdings.crypto.reduce((s,h)=>s+h.qty*h.avg,0);
  const total=kr+us+bn+go+cr;
  return{kr,us,bonds:bn,gold:go,crypto:cr,total,cost,pnl:total-cost,pnlPct:cost>0?(total-cost)/cost*100:0};
}

function perJudge(price,eps,indPer){
  if(!eps||!indPer)return null;
  const per=price/eps,r=per/indPer;
  if(eps<0)return{label:'적자',color:T.blue,per:null};
  if(r<0.70)return{label:'🟢 저평가',color:T.green,per};
  if(r<0.85)return{label:'🟡 소폭저',color:T.amber,per};
  if(r<1.15)return{label:'⚪ 적정',color:T.text2,per};
  if(r<1.30)return{label:'🟠 소폭고',color:T.amber,per};
  return{label:'🔴 고평가',color:T.red,per};
}

// ── 스위칭 ──
function calcMA3Arr(data){
  const f=data.filter(d=>d.val!==null);
  return f.slice(2).map((d,i)=>({ym:d.ym,ma3:(d.val+f[i+1].val+f[i].val)/3,val:d.val}));
}
function getSignal(data){
  const ma=calcMA3Arr(data);if(ma.length<3)return'insufficient';
  const n=ma.length;
  if(ma[n-1].ma3>ma[n-2].ma3&&ma[n-2].ma3>ma[n-3].ma3)return'bull';
  if(ma[n-1].ma3>ma[n-2].ma3)return'forming';return'bear';
}
function overallSignal(){
  const r=getSignal(portfolio.switching.retail),i=getSignal(portfolio.switching.ism);
  if(r==='bull'&&i==='bull')return{s:'bull',label:'🟢 경기 강세',sub:'수출주·가치주·대형주 비중 확대',color:T.green};
  if(r==='insufficient'||i==='insufficient')return{s:'wait',label:'⏳ 데이터 부족',sub:'지표 데이터를 입력해주세요',color:T.text3};
  if(r==='forming'||i==='forming')return{s:'forming',label:'🔶 신호 형성 중',sub:'3개월 연속 상승 조건 미충족',color:T.amber};
  return{s:'bear',label:'🔴 경기 약세',sub:'내수주·성장주·소형주 비중 확대',color:T.red};
}

  }

  for(const h of portfolio.holdings.watchlist){if(h.usd&&h.ticker){const p=await fetchUsPrice(h.ticker);if(p){h.cur=p;n++;}}else if(h.code){const p=await fetchKrPrice(h.code);if(p){h.cur=p;n++;}}}

  setTimeout(()=>{logs=[];render();},3000);
}

let searchResults=[],searchTimer;

async function doSearch(cat,q){
  clearTimeout(searchTimer);
  const el=document.getElementById('searchRes');
  if(!el||q.length<1){if(el)el.innerHTML='';return;}
  el.innerHTML=`<div style="color:${T.text3};font-size:12px;padding:8px">검색 중...</div>`;
  searchTimer=setTimeout(async()=>{
    const isKr=/[가-힣]/.test(q);
    let results=[];
    // 코인 (대체 탭 or 워치)
    if(cat==='alts'||cat==='watch'){
      try{
        const markets=await nativeGet('https://api.upbit.com/v1/market/all?isDetails=false');
        const qu=q.toUpperCase();
        const coins=markets.filter(m=>m.market.startsWith('KRW-')&&(
          m.market.replace('KRW-','').includes(qu)||m.korean_name.includes(q)||m.english_name.toUpperCase().includes(qu)
        )).slice(0,6).map(m=>({code:m.market,name:m.korean_name+'('+m.english_name+')',market:'Upbit',type:'crypto'}));
        results=[...results,...coins];
      }catch(e){}
    }
    // 국내주식 (한글 or kr탭 or watch탭)
    if(cat==='kr'||((cat==='watch')&&isKr)){
      try{
        const d=await nativeGet('https://ac.finance.naver.com/ac?q='+encodeURIComponent(q)+'&q_enc=UTF-8&st=111&t_korename=1&limit=8');
        if(d?.items?.length){
          const kr=d.items.map(it=>({code:it[0],name:it[1],market:it[6]||'KRX',type:'kr'}));
          results=[...results,...kr];
        }
      }catch(e){}
    }
    // 해외주식 (영문 or us/bonds탭 or watch탭)
    if(cat==='us'||cat==='bonds'||(cat==='watch'&&!isKr)){

let selectedStockInfo={};

async function selectStock(idx){
  const r=searchResults[idx];if(!r)return;
  document.getElementById('selName').textContent=r.name;
  document.getElementById('selCode').textContent=(r.code||r.ticker||'')+(r.market||r.exchange?(' · '+(r.market||r.exchange)):'');
  document.getElementById('addForm').style.display='block';
  document.getElementById('addForm').setAttribute('data-idx',idx);
  // 종목 정보 자동 조회 (가격·분류)
  document.getElementById('selName').textContent=r.name+' (조회중...)';
  const info=await fetchStockInfo(r.code,r.ticker,r.type);
  selectedStockInfo=info;
  document.getElementById('selName').textContent=r.name;
  if(info.price&&document.getElementById('addAvg')){document.getElementById('addAvg').value=info.price;document.getElementById('addCur')&&(document.getElementById('addCur').value=info.price);}
  const tags=classifyTags(r.name,info.sector,info.per,info.marketCap,r.type);
  const tagEl=document.getElementById('autoTags');
  if(tagEl)tagEl.innerHTML='<span style="font-size:11px;color:'+T.text3+'">자동 분류: </span>'+renderTags(tags);
  document.getElementById('addForm').setAttribute('data-tags',JSON.stringify(tags));
}

async function handlePhotoImport(input){
  if(!input.files||!input.files[0])return;
  if(!portfolio.apiKey){alert('설정 탭에서 API 키를 먼저 입력해주세요.');return;}
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=async e=>{
    const b64=e.target.result.split(',')[1],mt=file.type||'image/jpeg';
    showModal(`<div class="sheet-handle"></div><div style="font-size:16px;font-weight:700;color:${T.text};margin-bottom:12px">📷 사진 분석 중...</div><div class="pulse" style="color:${T.text2};font-size:13px">AI가 종목 정보를 추출하고 있습니다...</div>`);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':portfolio.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:'이미지는 증권 앱 보유종목 화면입니다. 종목명·코드/티커·보유수량·평균단가를 추출해 JSON 배열만 반환: [{"name":"","code":"","qty":0,"avg":0,"isKr":true}]. JSON만, 다른 텍스트 없이.'}]}]})});
      const data=await res.json();
      const items=JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
      showStockConfirm(items);
    }catch(e){closeModal();alert('인식 실패: '+e.message);}
  };
  reader.readAsDataURL(file);
}

function applyPhotoStocks(items){
  items.forEach(it=>{
    const id='p'+Date.now()+Math.random().toString(36).slice(2,5);

  if(tab!=='holdings')return;
  const dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;

      <div style="display:flex;gap:8px;align-items:center">${loadingPrice?`<span class="pulse" style="font-size:10px;color:${T.teal}">● LIVE</span>`:''}<span class="mono" style="font-size:11px;color:${T.text3}">${portfolio.lastUpdated}</span></div>
    </div>
    ${logs.length?`<div style="position:absolute;top:58px;left:10px;right:10px;z-index:150;background:${T.bg3}EE;border:1px solid ${T.border};border-radius:12px;padding:10px 14px">${logs.map(m=>`<div style="font-size:11px;color:${m.startsWith('✅')?T.green:T.text2};font-family:monospace;margin-bottom:2px">${m}</div>`).join('')}</div>`:''}
    <div style="flex:1;overflow:hidden;position:relative">${content}</div>
    <div style="height:62px;background:${T.bg2};border-top:1px solid ${T.border};display:flex;flex-shrink:0">
      ${TABS.map(t=>`<button onclick="tab='${t.id}';render()" class="tap" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:transparent;color:${tab===t.id?T.teal:T.text3};position:relative;padding:4px 0"><span style="font-size:18px">${t.ic}</span><span style="font-size:9px;font-weight:${tab===t.id?700:400}">${t.l}</span>${tab===t.id?`<div style="position:absolute;bottom:0;width:24px;height:2px;background:${T.teal};border-radius:1px"></div>`:''}</button>`).join('')}
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
