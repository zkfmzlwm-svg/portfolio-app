.tap:active{opacity:.72;transform:scale(.97);transition:all .08s}

// ── 상태 ──
let portfolio = JSON.parse(Storage.get('porto') || JSON.stringify(INIT));
let tab='home', catH='kr', filterP='all', monthly=200, priceLoading=false, logs=[];

// ── 헬퍼 ──
const won=(n,s=false)=>{
  if(n==null)return'—';
  const a=Math.abs(n),sg=n<0?'-':'';
  if(s){if(a>=1e8)return sg+(a/1e8).toFixed(1)+'억';if(a>=1e4)return sg+(a/1e4).toFixed(0)+'만';}
  return sg+a.toLocaleString('ko-KR');
};
const usd=n=>n==null?'—':'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>n==null?'—':`${n>=0?'+':''}${n.toFixed(2)}%`;
const pctC=n=>n>0?T.green:n<0?T.red:T.text2;

function calc(p){
  const EX=p.exRate;
  const kr=[...p.holdings.kr_stocks,...p.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.cur,0);
  const us=p.holdings.us.reduce((s,h)=>s+h.qty*h.cur*EX,0);
  const bn=p.holdings.bonds.reduce((s,h)=>s+h.qty*h.curKRW,0);
  const go=p.holdings.gold.reduce((s,h)=>s+h.qty*h.cur,0);
  const cr=p.holdings.crypto.reduce((s,h)=>s+h.qty*h.cur,0);
  const cost=[...p.holdings.kr_stocks,...p.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.avg,0)
    +p.holdings.us.reduce((s,h)=>s+h.qty*h.avg*EX,0)
    +p.holdings.bonds.reduce((s,h)=>s+h.qty*h.avgKRW,0)
    +p.holdings.gold.reduce((s,h)=>s+h.qty*h.avg,0)
    +p.holdings.crypto.reduce((s,h)=>s+h.qty*h.avg,0);
  const total=kr+us+bn+go+cr;
  return{kr,us,bonds:bn,gold:go,crypto:cr,total,cost,pnl:total-cost,pnlPct:cost>0?(total-cost)/cost*100:0};
}

function perJudge(price,eps,indPer){
  if(!eps||!indPer)return null;
  const per=price/eps,r=per/indPer;
  if(eps<0)return{label:'적자',color:T.blue,per:null};
  if(r<0.70)return{label:'🟢 저평가',color:T.green,per};
  if(r<0.85)return{label:'🟡 소폭저평가',color:T.amber,per};
  if(r<1.15)return{label:'⚪ 적정',color:T.text2,per};
  if(r<1.30)return{label:'🟠 소폭고평가',color:T.amber,per};
  return{label:'🔴 고평가',color:T.red,per};
}

const chip=(l,c)=>`<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:${c}22;color:${c};font-weight:700">${l}</span>`;
const card=(content,extra='')=>`<div style="background:${T.card};border-radius:14px;padding:14px 16px;border:1px solid ${T.border};margin-bottom:8px;${extra}">${content}</div>`;
const secL=t=>`<div style="font-size:11px;font-weight:700;color:${T.text3};letter-spacing:0.1em;text-transform:uppercase;padding:16px 0 8px">${t}</div>`;
const btn=(label,onclick,color,extra='')=>`<button onclick="${onclick}" style="width:100%;padding:13px;background:${color};color:${color===T.amber?'#000':'#fff'};border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;${extra}">${label}</button>`;

    </div>
    ${secL('자산 구성')}
    ${assets.map(a=>{

        <div style="display:flex;justify-content:space-between;margin-bottom:8px">

          <span class="num" style="font-size:15px;color:${T.text}">${won(a.ev,true)}</span>
        </div>
        <div style="height:5px;background:${T.border};border-radius:3px;overflow:hidden;margin-bottom:7px">
          <div style="height:100%;width:${Math.min(100,cur).toFixed(1)}%;background:linear-gradient(90deg,${a.color}55,${a.color});border-radius:3px;transition:width .5s"></div>
        </div>
        <div style="display:flex;justify-content:space-between">
          <span class="num" style="font-size:12px;color:${T.text2}">${cur.toFixed(1)}%</span>
          <span style="font-size:12px;color:${Math.abs(diff)<3?T.green:T.amber}">목표 ${a.tgt}% ${Math.abs(diff)<0.5?'✓':diff>0?`+${diff.toFixed(1)}%`:`${diff.toFixed(1)}%`}</span>
        </div>
      `);
    }).join('')}

}

function holdingsScreen(){
  const EX=portfolio.exRate;
  const cats=[{id:'kr',l:'국내'},{id:'us',l:'해외'},{id:'bonds',l:'채권'},{id:'alts',l:'대체'}];
  let items=[];
  if(catH==='kr')items=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs];
  else if(catH==='us')items=portfolio.holdings.us;
  else if(catH==='bonds')items=portfolio.holdings.bonds;
  else items=[...portfolio.holdings.gold,...portfolio.holdings.crypto];
  const isFgn=catH==='us',isBond=catH==='bonds';
  return `<div style="display:flex;flex-direction:column;height:100%">
    <div style="padding:12px 16px;background:${T.bg2};border-bottom:1px solid ${T.border}">
      ${btn(priceLoading?'<span class="spin">⟳</span> 조회 중...':'↻  AI 실시간 가격 업데이트','handlePrice()',priceLoading?T.bg3:T.blue,`opacity:${priceLoading?.6:1}`)}
    </div>
    <div style="display:flex;padding:10px 16px;gap:8px;background:${T.bg2};border-bottom:1px solid ${T.border}">
      ${cats.map(c=>`<button onclick="catH='${c.id}';render()" style="flex:1;padding:8px;border-radius:10px;border:none;cursor:pointer;background:${catH===c.id?T.teal:T.bg3};color:${catH===c.id?'#000':T.text2};font-size:13px;font-weight:${catH===c.id?700:400};font-family:'Noto Sans KR',sans-serif">${c.l}</button>`).join('')}
    </div>
    <div class="scroll" style="flex:1;padding:8px 16px 24px">
      ${items.map(h=>{
        const curP=isBond?h.curKRW:h.cur,avgP=isBond?h.avgKRW:h.avg;
        const ev=isFgn?h.qty*h.cur*EX:h.qty*curP,cost2=isFgn?h.qty*h.avg*EX:h.qty*avgP;
        const pnl2=ev-cost2,pnlP=cost2>0?pnl2/cost2*100:0;
        const judge=h.eps&&h.indPer?perJudge(h.cur,h.eps,h.indPer):null;
        return card(`
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div>
              <div style="display:flex;gap:6px;align-items:center;margin-bottom:3px;flex-wrap:wrap">
                <span style="font-size:15px;font-weight:700;color:${T.text}">${h.name}</span>
                ${h.sector?chip(h.sector,T.teal):h.tag?chip(h.tag,T.teal):h.note?chip(h.note,T.teal):''}
              </div>
              <span class="num" style="font-size:11px;color:${T.text3}">수량 ${h.qty<1?h.qty.toFixed(6):h.qty.toFixed(2)}</span>
            </div>
            <div style="text-align:right">
              <div class="num" style="font-size:16px;font-weight:700;color:${T.text}">${won(ev,true)}</div>
              <div class="num" style="font-size:13px;color:${pctC(pnlP)}">${pct(pnlP)}</div>
            </div>
          </div>
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid ${T.border};display:grid;grid-template-columns:1fr 1fr;gap:6px">
            ${[['현재가',isBond?won(curP):isFgn?usd(h.cur):won(h.cur)],['평균단가',isBond?won(avgP):isFgn?usd(h.avg):won(h.avg)],['평가금액',won(ev)],['손익',`${pnl2>=0?'+':''}${won(pnl2,true)}`]].map(([k,v])=>`<div style="background:${T.bg2};border-radius:8px;padding:8px"><div style="font-size:10px;color:${T.text3};margin-bottom:2px">${k}</div><div class="num" style="font-size:12px;color:${T.text};font-weight:600">${v}</div></div>`).join('')}
          </div>
          ${judge?`<div style="margin-top:8px;padding:8px;background:${T.bg2};border-radius:8px;font-size:12px;color:${judge.color};font-weight:700">PER: ${judge.label}${judge.per?` · ${judge.per.toFixed(1)}x vs ${h.indPer}x`:''}</div>`:''}
        `);
      }).join('')}
    </div>
  </div>`;
}

async function handlePrice(){
  if(priceLoading)return;
  priceLoading=true;logs=['가격 업데이트 시작...'];render();
  try{
    const holds=[
      ...portfolio.holdings.kr_stocks.map(h=>({id:h.id,n:h.name,c:h.code,m:'KOSDAQ',k:'KRW',v:h.cur})),
      ...portfolio.holdings.kr_etfs.map(h=>({id:h.id,n:h.name,c:h.code,m:'KOSPI',k:'KRW',v:h.cur})),
      ...portfolio.holdings.us.map(h=>({id:h.id,n:h.name,c:h.name,m:'NYSE',k:'USD',v:h.cur})),
    ];
    const SYS=`Financial price assistant. Search current prices. Return ONLY JSON: {"timestamp":"YYYY-MM-DD HH:MM","exchange_rate":<number>,"prices":[{"id":"<id>","price":<number or null>}]}`;
    let msgs=[{role:'user',content:`Prices:\n${holds.map(h=>`id=${h.id} ${h.n}(${h.c}) ${h.m} ${h.k} prev=${h.v}`).join('\n')}`}];
    let finalText='',turn=0;
    while(!finalText&&turn<10){
      turn++;logs=[...logs,`API ${turn}회차...`];render();
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,tools:[{type:'web_search_20250305',name:'web_search'}],messages:msgs})});
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      if(data.stop_reason==='end_turn'){finalText=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');logs=[...logs,'응답 수신'];}
      else if(data.stop_reason==='tool_use'){const s=data.content.filter(b=>b.type==='tool_use');logs=[...logs,`검색 ${s.length}건`];render();msgs.push({role:'assistant',content:data.content});msgs.push({role:'user',content:s.map(b=>({type:'tool_result',tool_use_id:b.id,content:'Done.'}))});}
      else break;
    }
    const m=finalText.replace(/```json/g,'').replace(/```/g,'').trim().match(/\{[\s\S]*\}/);
    if(!m)throw new Error('파싱 실패');
    const result=JSON.parse(m[0]);
    const map={};(result.prices||[]).forEach(p=>{if(p.price!=null)map[p.id]=p.price;});
    if(result.exchange_rate)portfolio.exRate=result.exchange_rate;
    ['kr_stocks','kr_etfs'].forEach(k=>{portfolio.holdings[k]=portfolio.holdings[k].map(h=>map[h.id]?{...h,cur:map[h.id]}:h);});
    portfolio.holdings.us=portfolio.holdings.us.map(h=>map[h.id]?{...h,cur:map[h.id]}:h);
    portfolio.lastUpdated=new Date().toISOString().slice(0,10);
    Storage.set('porto',JSON.stringify(portfolio));
    logs=[...logs,`✅ ${Object.keys(map).length}개 업데이트`];
  }catch(e){logs=[...logs,`❌ ${e.message}`];}
  priceLoading=false;render();
  setTimeout(()=>{logs=[];render();},4000);
}

async function fetchUpbit(){
  try{
    const codes=portfolio.holdings.crypto.map(h=>h.upbit).join(',');
    const res=await fetch(`https://api.upbit.com/v1/ticker?markets=${codes}`);
    const data=await res.json();
    const map={};data.forEach(d=>{map[d.market]=d.trade_price;});
    portfolio.holdings.crypto=portfolio.holdings.crypto.map(h=>({...h,cur:map[h.upbit]??h.cur}));
    portfolio.lastUpdated=new Date().toISOString().slice(0,10);
    Storage.set('porto',JSON.stringify(portfolio));
    alert(`✅ 업비트 업데이트!\nBTC: ${won(map['KRW-BTC'],true)}\nMANA: ${map['KRW-MANA']}원\nBORA: ${map['KRW-BORA']}원`);
    render();
  }catch(e){alert('업비트 연결 실패: '+e.message);}
}

function saveEx(){
  const v=+document.getElementById('exIn').value;
  if(v>0){portfolio.exRate=v;Storage.set('porto',JSON.stringify(portfolio));render();}
}
