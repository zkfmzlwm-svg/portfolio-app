  window.HttpBridge._fail=id=>{window.HttpBridge._cb[id]&&(window.HttpBridge._cb[id](null),delete window.HttpBridge._cb[id]);};
}

async function nativeGet(url){
  if(window.HttpBridge){
    return new Promise((res,rej)=>{
      const id='r'+Date.now()+Math.random().toString(36).slice(2,6);
      window.HttpBridge._cb[id]=d=>d?res(JSON.parse(d)):rej(new Error('fetch fail'));
      window.HttpBridge.get(url,id);
    });
  }
  return fetch(url,{headers:{'User-Agent':'Mozilla/5.0'}}).then(r=>r.json());
}

function autoTagByName(name,isUs){
  const n=(name||'').toLowerCase();
  if(['인버스','곱버스','inverse','short'].some(k=>n.includes(k)))return['헤지'];
  const tags=[];
  if(['반도체','전자','디스플레이','자동차','조선','화학','배터리','이차전지','ai전','smr','원자력','전력인프라','방산','chip','semiconductor'].some(k=>n.includes(k)))tags.push('수출주');
  if(['은행','금융','통신','유통','소매','음식','식품','건설','부동산','헬스케어','엔터','미디어','k엔터'].some(k=>n.includes(k)))tags.push('내수주');
  if(['삼성','현대','포스코','s&p','sp500','kospi','top10','대형','voo','spy'].some(k=>n.includes(k)))tags.push('대형주');
  if(['소형','중소','스몰','small'].some(k=>n.includes(k)))tags.push('소형주');
  if(['바이오','헬스','biotech','joby','lunar','arkk','성장','신성장'].some(k=>n.includes(k)))tags.push('성장주');
  if(['배당','dividend','income','채권','bond','treasury','bnd','shy','tlt','국고채','우량회사채'].some(k=>n.includes(k)))tags.push('가치주');
  // 성장/가치 둘 다 없으면 기본값 적용 (해외=성장주 가정, 국내도 동일)
  if(!tags.some(t=>['성장주','가치주'].includes(t)))tags.push('성장주');
  return tags.length?tags:['성장주'];
}

function migratePortfolio(p){
  const lists=[p.holdings.kr_stocks,p.holdings.kr_etfs,p.holdings.us,p.holdings.bonds,p.holdings.watchlist||[]];
  lists.forEach(list=>list.forEach(h=>{
    // 알려진 ID → 항상 정확한 태그로 강제 덮어씀 (구버전 태그 제거)
    if(TAG_MAP[h.id]){
      h.tags=TAG_MAP[h.id];
    }
    // 태그 없거나 6분류 아닌 값만 있으면 자동 분류
    else if(!h.tags||!h.tags.length||!h.tags.some(t=>VALID6.has(t))){
      h.tags=autoTagByName(h.name,!!(h.ticker&&!h.code));
    }
  }));
  // v3.2 미만: 사진 데이터(수량/단가) 강제 업데이트
  if(!p.ver||p.ver<'3.2')updateToV32(p);
  p.ver='3.5';
  return p;
}

  const pri=['헤지','성장주','수출주','내수주','소형주','가치주','대형주'];
  const main=pri.find(t=>tags.includes(t))||tags[0];
  const c=TAG_COLOR[main]||T.text3;
  return `<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:${c}22;color:${c};font-weight:700;white-space:nowrap">${label}</span>`;
}

// ── 분류 자동 판정 ──
function classifyTags(name,sector,per,marketCap,type){
  const tags=[];
  const nm=(name||'').toLowerCase();
  const sc=(sector||'').toLowerCase();
  const txt=nm+' '+sc;
  const exportKW=['반도체','전자','디스플레이','자동차','조선','화학','배터리','이차전지','소프트웨어','통신장비','기계','철강','에너지','equipment','semiconductor','tech','chip'];
  const domKW=['은행','금융','통신','유통','소매','음식료','건설','부동산','의료','보험','pharmaceutical','healthcare','retail','bank'];
  const exportHit=exportKW.filter(k=>txt.includes(k)).length;
  const domHit=domKW.filter(k=>txt.includes(k)).length;
  // 수출/내수는 더 많이 매칭된 쪽만 (동점이면 수출주 우선)
  if(exportHit>0&&exportHit>=domHit)tags.push('수출주');
  else if(domHit>0)tags.push('내수주');
  // 시총 기반 대형/소형
  if(type==='kr'&&marketCap){const cap=typeof marketCap==='string'?parseInt(marketCap.replace(/[^0-9]/g,'')):marketCap;if(cap>=1e12)tags.push('대형주');else if(cap<5e11)tags.push('소형주');}
  else if(type==='us'&&marketCap){if(marketCap>=10e9)tags.push('대형주');else if(marketCap<2e9)tags.push('소형주');}
  // PER 기반 성장/가치
  const perNum=parseFloat(per);
  if(perNum>0&&perNum<15)tags.push('가치주');else if(!perNum||perNum>30)tags.push('성장주');
  return tags.length?tags:['성장주'];
}

// ── 계산 ──
function calc(){
  const EX=portfolio.exRate;
  const kr=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.cur,0);
  const us=portfolio.holdings.us.reduce((s,h)=>s+h.qty*h.cur*EX,0);
  const bn=portfolio.holdings.bonds.reduce((s,h)=>s+h.qty*(h.curKRW||0),0);
  const go=portfolio.holdings.gold.reduce((s,h)=>s+h.qty*h.cur,0);
  const cr=portfolio.holdings.crypto.reduce((s,h)=>s+h.qty*h.cur,0);
  const cost=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.avg,0)
    +portfolio.holdings.us.reduce((s,h)=>s+h.qty*h.avg*EX,0)
    +portfolio.holdings.bonds.reduce((s,h)=>s+h.qty*(h.avgKRW||0),0)
    +portfolio.holdings.gold.reduce((s,h)=>s+h.qty*h.avg,0)
    +portfolio.holdings.crypto.reduce((s,h)=>s+h.qty*h.avg,0);
  const total=kr+us+bn+go+cr;
  return{kr,us,bonds:bn,gold:go,crypto:cr,total,cost,pnl:total-cost,pnlPct:cost>0?(total-cost)/cost*100:0};
}

function perJudge(price,eps,indPer){
  if(!eps||!indPer)return null;
  const per=price/eps,r=per/indPer;
  if(eps<0)return{label:'적자',color:T.blue,per:null};
  if(r<0.70)return{label:'🟢 저평가',color:T.green,per};
  if(r<0.85)return{label:'🟡 소폭저',color:T.amber,per};
  if(r<1.15)return{label:'⚪ 적정',color:T.text2,per};
  if(r<1.30)return{label:'🟠 소폭고',color:T.amber,per};
  return{label:'🔴 고평가',color:T.red,per};
}

// ── 스위칭 ──
function calcMA3Arr(data){
  const f=data.filter(d=>d.val!==null);
  return f.slice(2).map((d,i)=>({ym:d.ym,ma3:(d.val+f[i+1].val+f[i].val)/3,val:d.val}));
}
function getSignal(data){
  const ma=calcMA3Arr(data);if(ma.length<3)return'insufficient';
  const n=ma.length;
  const r1=ma[n-1].ma3>ma[n-2].ma3; // 최근 1개월 상승
  const r2=ma[n-2].ma3>ma[n-3].ma3; // 그 전월 상승
  if(r1&&r2)return'bull';      // 3개월 연속 상승 (MA3 2회 연속↑)
  if(r1)return'forming';       // 직전월만 상승 (형성 초기)
  return'bear';                // 하락
}
function overallSignal(){
  const r=getSignal(portfolio.switching.retail),i=getSignal(portfolio.switching.ism);
  if(r==='bull'&&i==='bull')return{s:'bull',label:'🟢 경기 강세',sub:'수출주·가치주·대형주 비중 확대',color:T.green};
  if(r==='insufficient'||i==='insufficient')return{s:'wait',label:'⏳ 데이터 부족',sub:'지표 데이터를 입력해주세요',color:T.text3};
  if(r==='forming'||i==='forming')return{s:'forming',label:'🔶 신호 형성 중',sub:'3개월 연속 상승 조건 미충족',color:T.amber};
  return{s:'bear',label:'🔴 경기 약세',sub:'내수주·성장주·소형주 비중 확대',color:T.red};
}

// 네이버 통합 종목검색 (국내+해외, 종목명·코드·티커 모두)
async function searchNaver(q){
  try{
    const url='https://m.stock.naver.com/front-api/search/autoComplete?query='+encodeURIComponent(q)+'&target=stock,index,etf';
    const d=await nativeGet(url);
    const items=(d&&d.result&&d.result.items)||(d&&d.items)||[];
    return items.map(it=>{
      const code=it.code||it.symbolCode||'';
      const nation=it.nationCode||it.nationType||'';
      const typeName=it.typeName||it.stockExchangeName||it.categoryName||'';
      // 국내 판정: 6자리 숫자 코드 or 국내 거래소
      const isKr=(/^\d{6}$/.test(code))||nation==='KOR'||/KOSPI|KOSDAQ|KONEX|코스피|코스닥/.test(typeName);
      return{
        code:code,
        ticker:isKr?null:(it.reutersCode||it.symbolCode||code),
        name:it.name||it.korName||it.stockName||'',
        market:typeName||(isKr?'KRX':'US'),
        type:isKr?'kr':'us'
      };
    }).filter(x=>x.name&&x.code);
  }catch(e){return[];}
}

// 야후 검색 (해외 백업)
async function searchYahoo(q){
  try{
    const d=await nativeGet('https://query1.finance.yahoo.com/v1/finance/search?q='+encodeURIComponent(q)+'&quotesCount=8&newsCount=0&enableFuzzyQuery=false');
    if(!d||!d.quotes||!d.quotes.length)return[];
    return d.quotes.filter(x=>['EQUITY','ETF'].includes(x.quoteType)).slice(0,8)
      .map(x=>({ticker:x.symbol,code:x.symbol,name:x.shortname||x.longname||x.symbol,market:x.exchange||'US',type:'us'}));
  }catch(e){return[];}
}

// 업비트 코인 검색
async function searchCoin(q){
  try{
    const markets=await nativeGet('https://api.upbit.com/v1/market/all?isDetails=false');
    const qu=q.toUpperCase();
    return markets.filter(m=>m.market.startsWith('KRW-')&&(
      m.market.replace('KRW-','').includes(qu)||m.korean_name.includes(q)||m.english_name.toUpperCase().includes(qu)
    )).slice(0,6).map(m=>({code:m.market,name:m.korean_name+'('+m.english_name+')',market:'Upbit',type:'crypto'}));
  }catch(e){return[];}
}

async function doSearch(cat,q){
  clearTimeout(searchTimer);
  const el=document.getElementById('searchRes');
  if(!el||q.trim().length<1){if(el)el.innerHTML='';return;}
  el.innerHTML=`<div style="color:${T.text3};font-size:12px;padding:14px;text-align:center"><span class="spin">⟳</span> 검색 중...</div>`;
  searchTimer=setTimeout(async()=>{
    let results=[];
    try{
      if(cat==='alts'){
        const [coins,naver]=await Promise.all([searchCoin(q),searchNaver(q)]);
        results=[...coins,...naver.filter(x=>x.type==='kr')];
      }else if(cat==='us'||cat==='bonds'){
        const naver=await searchNaver(q);
        let us=naver.filter(x=>x.type==='us');
        if(us.length===0)us=await searchYahoo(q);
        results=us;
      }else if(cat==='kr'){
        const naver=await searchNaver(q);
        results=naver.filter(x=>x.type==='kr');
      }else{ // watch: 전체
        const [naver,coins]=await Promise.all([searchNaver(q),searchCoin(q)]);
        results=[...naver,...coins];
        if(naver.filter(x=>x.type==='us').length===0){
          const us=await searchYahoo(q);results=[...results,...us];
        }
      }
    }catch(e){}
    // 중복 제거
    const seen=new Set();
    results=results.filter(r=>{const k=r.code||r.ticker;if(!k||seen.has(k))return false;seen.add(k);return true;});
    searchResults=results;
    const resEl=document.getElementById('searchRes');
    if(!resEl)return;
    resEl.innerHTML=results.length===0
      ?`<div style="color:${T.text3};font-size:13px;padding:16px;text-align:center">검색 결과가 없습니다<br><span style="font-size:11px;color:${T.text3}">종목명·종목코드·티커로 검색하세요</span></div>`
      :results.map((r,i)=>`<div onclick="selectStock(${i})" class="tap" style="padding:11px 12px;border-radius:10px;background:${T.bg};border:1px solid ${T.border};margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <div style="min-width:0;flex:1">
          <div style="font-size:14px;font-weight:600;color:${T.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</div>
          <div style="font-size:11px;color:${T.text3};margin-top:1px">${r.code||r.ticker||''} · ${r.market||''}</div>
        </div>
        <span style="font-size:10px;padding:3px 9px;border-radius:20px;background:${r.type==='kr'?T.teal:r.type==='crypto'?T.amber:T.blue}22;color:${r.type==='kr'?T.teal:r.type==='crypto'?T.amber:T.blue};font-weight:700;flex-shrink:0;margin-left:8px">${r.type==='kr'?'국내':r.type==='crypto'?'코인':'해외'}</span>
      </div>`).join('');
  },350);
}

let selectedStockInfo={},selectStockSeq=0;

async function selectStock(idx){
  const r=searchResults[idx];if(!r)return;
  const seq=++selectStockSeq; // race condition 방지용 시퀀스
  document.getElementById('selCode').textContent=(r.code||r.ticker||'')+(r.market||r.exchange?(' · '+(r.market||r.exchange)):'');
  document.getElementById('addForm').style.display='block';
  document.getElementById('addForm').setAttribute('data-idx',idx);
  document.getElementById('selName').textContent=r.name+' (조회중...)';
  const info=await fetchStockInfo(r.code,r.ticker,r.type);
  // 더 최근 선택이 있으면 이 결과 무시 (오래된 응답 폐기)
  if(seq!==selectStockSeq)return;
  selectedStockInfo=info;
  document.getElementById('selName').textContent=r.name;
  const avgEl=document.getElementById('addAvg');
  if(info.price&&avgEl&&!avgEl.value)avgEl.value=info.price;
  const tags=classifyTags(r.name,info.sector,info.per,info.marketCap,r.type);
  const tagEl=document.getElementById('autoTags');
  if(tagEl)tagEl.innerHTML='<span style="font-size:11px;color:'+T.text3+'">자동 분류: </span>'+renderTags(tags);
  document.getElementById('addForm').setAttribute('data-tags',JSON.stringify(tags));
}

async function handleTextImport(text){
  if(!text||!text.trim()){alert('텍스트를 붙여넣어주세요.');return;}
  if(!portfolio.apiKey){alert('설정 탭에서 Claude API 키를 먼저 입력해주세요.\n(console.anthropic.com에서 무료 발급)');return;}
  const safeText=text.slice(0,400).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  showModal(`<div class="sheet-handle"></div>
    <div style="font-size:16px;font-weight:700;color:${T.text};margin-bottom:12px">🔍 Claude 분석 중...</div>
    <div class="pulse" style="font-size:13px;color:${T.text2};margin-bottom:16px">텍스트에서 종목 정보를 추출하고 있습니다...</div>
    <div style="background:${T.bg2};border-radius:10px;padding:12px;max-height:150px;overflow-y:auto">
      <div style="font-size:11px;color:${T.text3};white-space:pre-wrap;line-height:1.5">${safeText}${text.length>400?'\n...':''}
      </div>
    </div>`);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':portfolio.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:`다음은 증권 앱 보유종목 화면의 OCR 텍스트입니다. 종목명·코드/티커·보유수량·평균단가를 추출해 JSON 배열만 반환하세요.
형식: [{"name":"종목명","code":"코드또는티커","qty":수량숫자,"avg":평균단가숫자,"isKr":true}]
- 국내: isKr=true, code는 6자리 숫자 (없으면 "")
- 해외: isKr=false, code는 티커 영문자
- 수량/단가는 쉼표·원화기호 제거한 순수 숫자
- JSON 배열만, 설명 없이

텍스트:
${text}`}]})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content[0].text.replace(/```json|```/g,'').trim();
    const items=JSON.parse(raw);
    if(!items.length)throw new Error('종목 정보를 찾을 수 없습니다.');
    showStockConfirm(items);
  }catch(e){
    closeModal();
    alert('분석 실패: '+e.message+'\n\nTip: 텍스트가 너무 짧거나 형식이 다를 수 있습니다.\n종목명·수량·단가가 포함된 텍스트를 붙여넣어주세요.');
  }
}

function applyPhotoStocks(){
  const items=window._pendingPhotoItems;
  if(!items)return;
  items.forEach(it=>{
    const id='p'+Date.now()+Math.random().toString(36).slice(2,5);
    if(it.isKr){
      const ex=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].find(h=>h.code===it.code||h.name===it.name);
      if(ex){ex.qty=it.qty;ex.avg=it.avg;}
      else portfolio.holdings.kr_stocks.push({id,name:it.name,code:it.code,qty:it.qty,avg:it.avg,cur:it.avg,tags:['성장주']});
    }else{
      const ex=portfolio.holdings.us.find(h=>h.ticker===it.code||h.name===it.name);
      if(ex){ex.qty=it.qty;ex.avg=it.avg;}
      else portfolio.holdings.us.push({id,name:it.name,ticker:it.code,qty:it.qty,avg:it.avg,cur:it.avg,tags:['성장주']});
    }
  });
  Store.set('porto',JSON.stringify(portfolio));
  closeModal();
  alert('✅ '+items.length+'개 종목 반영 완료');
  render();
}

    <div style="font-size:16px;font-weight:700;color:${T.text};margin-bottom:4px">📊 지표 업데이트</div>
    <div style="font-size:12px;color:${T.text3};margin-bottom:18px">최신 발표 데이터를 입력하세요</div>
    <div style="background:${T.bg2};border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:${T.teal};margin-bottom:10px">🛍 미국 소매판매 YoY (%)</div>
      <div style="font-size:11px;color:${T.text3};margin-bottom:8px">
        입력 월: <span style="color:${T.text}">${rYM}</span>
        ${rLast?` · 직전값: <span style="color:${T.amber}">${rLast.val}% (${rLast.ym})</span>`:''}
      </div>
      <input type="number" id="retailInput" placeholder="예: 4.9" step="0.1"
        style="font-size:18px;text-align:center;font-family:monospace">
    </div>
    <div style="background:${T.bg2};border-radius:12px;padding:14px;margin-bottom:18px">
      <div style="font-size:13px;font-weight:700;color:${T.blue};margin-bottom:10px">🏭 ISM 제조업 가격지수 (pt)</div>
      <div style="font-size:11px;color:${T.text3};margin-bottom:8px">
        입력 월: <span style="color:${T.text}">${iYM}</span>
        ${iLast?` · 직전값: <span style="color:${T.amber}">${iLast.val}pt (${iLast.ym})</span>`:''}
      </div>
      <input type="number" id="ismInput" placeholder="예: 82.1" step="0.1"
        style="font-size:18px;text-align:center;font-family:monospace">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="saveSwitchUpdate('${rYM}','${iYM}')" class="tap"
        style="flex:1;padding:14px;background:${T.teal};color:#000;border-radius:12px;font-size:15px;font-weight:700">저장</button>
      <button onclick="closeModal()" class="tap"
        style="flex:1;padding:14px;background:${T.bg3};color:${T.text2};border-radius:12px;font-size:14px">취소</button>
    </div>`);
  setTimeout(()=>document.getElementById('retailInput')?.focus(),300);
}

function saveSwitchUpdate(rYM,iYM){
  const rv=document.getElementById('retailInput')?.value;
  const iv=document.getElementById('ismInput')?.value;
  let saved=0;
  if(rv!==''&&rv!=null){
    const rVal=parseFloat(rv);
    if(!isNaN(rVal)){
      const idx=portfolio.switching.retail.findIndex(d=>d.ym===rYM);
      if(idx>=0)portfolio.switching.retail[idx].val=rVal;
      else portfolio.switching.retail.push({ym:rYM,val:rVal});
      portfolio.switching.retail.sort((a,b)=>a.ym.localeCompare(b.ym));
      saved++;
    }
  }
  if(iv!==''&&iv!=null){
    const iVal=parseFloat(iv);
    if(!isNaN(iVal)){
      const idx=portfolio.switching.ism.findIndex(d=>d.ym===iYM);
      if(idx>=0)portfolio.switching.ism[idx].val=iVal;
      else portfolio.switching.ism.push({ym:iYM,val:iVal});
      portfolio.switching.ism.sort((a,b)=>a.ym.localeCompare(b.ym));
      saved++;
    }
  }
  if(saved>0){
    Store.set('porto',JSON.stringify(portfolio));
    closeModal();
    tab='switching';
    render();
  }else{
    alert('값을 입력해주세요.');
  }
}

// ── 모달 ──
function showModal(c){document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="sheet">${c}</div></div>`;}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ── 스와이프 (종목 탭 좌우) ──
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(tab!=='holdings')return;
  const dx=e.changedTouches[0].clientX-touchStartX,dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
  const cats=['kr','us','bonds','alts','watch'],idx=cats.indexOf(catH);
  if(dx<0&&idx<cats.length-1){catH=cats[idx+1];render();}
  else if(dx>0&&idx>0){catH=cats[idx-1];render();}
},{passive:true});

// ── 메인 렌더 ──
const TABS=[{id:'home',ic:'◎',l:'홈'},{id:'holdings',ic:'≡',l:'종목'},{id:'switching',ic:'⇄',l:'스위칭'},{id:'rebal',ic:'⊖',l:'리밸런싱'},{id:'analysis',ic:'↗',l:'분석'},{id:'settings',ic:'◈',l:'설정'}];

function render(){
  let content='';
  if(tab==='home')content=homeScreen();
  else if(tab==='holdings')content=holdingsScreen();
  else if(tab==='switching')content=switchingScreen();
  else if(tab==='rebal')content=rebalScreen();
  else if(tab==='analysis')content=analysisScreen();
  else content=settingsScreen();

  document.getElementById('app').innerHTML=`<div style="width:100%;height:100vh;display:flex;flex-direction:column;background:${T.bg};overflow:hidden;position:relative">
    <div style="height:50px;background:${T.bg2};display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;border-bottom:1px solid ${T.border}">
      <span style="font-size:15px;font-weight:800;color:${T.text}">📊 포트폴리오</span>
      <div style="display:flex;gap:8px;align-items:center">${loadingPrice?`<span class="pulse" style="font-size:10px;color:${T.teal}">● LIVE</span>`:''}<span class="mono" style="font-size:11px;color:${T.text3}">${portfolio.lastUpdated}</span></div>
    </div>
    ${logs.length?`<div style="position:absolute;top:58px;left:10px;right:10px;z-index:150;background:${T.bg3}EE;border:1px solid ${T.border};border-radius:12px;padding:10px 14px">${logs.map(m=>`<div style="font-size:11px;color:${m.startsWith('✅')?T.green:T.text2};font-family:monospace;margin-bottom:2px">${m}</div>`).join('')}</div>`:''}
    <div style="flex:1;overflow:hidden;position:relative">${content}</div>
    <div style="height:62px;background:${T.bg2};border-top:1px solid ${T.border};display:flex;flex-shrink:0">
      ${TABS.map(t=>`<button onclick="tab='${t.id}';render()" class="tap" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:transparent;color:${tab===t.id?T.teal:T.text3};position:relative;padding:4px 0"><span style="font-size:18px">${t.ic}</span><span style="font-size:9px;font-weight:${tab===t.id?700:400}">${t.l}</span>${tab===t.id?`<div style="position:absolute;bottom:0;width:24px;height:2px;background:${T.teal};border-radius:1px"></div>`:''}</button>`).join('')}
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
