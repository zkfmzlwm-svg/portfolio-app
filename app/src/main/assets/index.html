// ── HttpBridge 초기화 (Java 콜백 패턴) ──
if(window.HttpBridge){
  window.HttpBridge._cb={};
  window.HttpBridge._deliver=id=>{
    const d=window.HttpBridge.fetch(id);
    if(window.HttpBridge._cb[id]){window.HttpBridge._cb[id](d);delete window.HttpBridge._cb[id];}
  };
  window.HttpBridge._fail=id=>{
    if(window.HttpBridge._cb[id]){window.HttpBridge._cb[id](null);delete window.HttpBridge._cb[id];}
  };
}

async function nativeGet(url){
  if(window.HttpBridge){
    return new Promise((res,rej)=>{
      const id='r'+Date.now()+Math.random().toString(36).slice(2,6);
      window.HttpBridge._cb[id]=data=>data?res(JSON.parse(data)):rej(new Error('fetch fail'));
      window.HttpBridge.get(url,id);
    });
  }
  const r=await fetch(url,{headers:{'User-Agent':'Mozilla/5.0'}});
  return r.json();
}

function calc(){
  const EX=portfolio.exRate;
  const kr=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.cur,0);
  const us=portfolio.holdings.us.reduce((s,h)=>s+h.qty*h.cur*EX,0);
  const bn=portfolio.holdings.bonds.reduce((s,h)=>s+h.qty*(h.curKRW||0),0);
  const go=portfolio.holdings.gold.reduce((s,h)=>s+h.qty*h.cur,0);
  const cr=portfolio.holdings.crypto.reduce((s,h)=>s+h.qty*h.cur,0);
  const cost=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].reduce((s,h)=>s+h.qty*h.avg,0)
    +portfolio.holdings.us.reduce((s,h)=>s+h.qty*h.avg*EX,0)
    +portfolio.holdings.bonds.reduce((s,h)=>s+h.qty*(h.avgKRW||0),0)
    +portfolio.holdings.gold.reduce((s,h)=>s+h.qty*h.avg,0)
    +portfolio.holdings.crypto.reduce((s,h)=>s+h.qty*h.avg,0);
  const total=kr+us+bn+go+cr;
  return{kr,us,bonds:bn,gold:go,crypto:cr,total,cost,pnl:total-cost,pnlPct:cost>0?(total-cost)/cost*100:0};
}

function perJudge(price,eps,indPer){
  if(!eps||!indPer)return null;
  const per=price/eps,r=per/indPer;
  if(eps<0)return{label:'적자',color:T.blue,per:null};
  if(r<0.70)return{label:'🟢 저평가',color:T.green,per};
  if(r<0.85)return{label:'🟡 소폭저',color:T.amber,per};
  if(r<1.15)return{label:'⚪ 적정',color:T.text2,per};
  if(r<1.30)return{label:'🟠 소폭고',color:T.amber,per};
  return{label:'🔴 고평가',color:T.red,per};
}

// ═══════════════════════════════════════
// SWITCHING STRATEGY LOGIC
// ═══════════════════════════════════════
function calcMA3Arr(data){
  const filled=data.filter(d=>d.val!==null);
  const result=[];
  for(let i=2;i<filled.length;i++){
    result.push({ym:filled[i].ym,ma3:(filled[i].val+filled[i-1].val+filled[i-2].val)/3,val:filled[i].val});
  }
  return result;
}

function getSignal(data){
  const ma=calcMA3Arr(data);
  if(ma.length<3)return'insufficient';
  const n=ma.length;
  const r3=ma[n-1].ma3>ma[n-2].ma3&&ma[n-2].ma3>ma[n-3].ma3;
  const r2=ma[n-1].ma3>ma[n-2].ma3;
  if(r3)return'bull';
  if(r2)return'forming';
  return'bear';
}

function overallSignal(){
  const r=getSignal(portfolio.switching.retail);
  const i=getSignal(portfolio.switching.ism);
  if(r==='bull'&&i==='bull')return{s:'bull',label:'🟢 경기 강세',sub:'수출주·가치주·대형주 비중 확대',color:T.green};
  if(r==='insufficient'||i==='insufficient')return{s:'wait',label:'⏳ 데이터 부족',sub:'지표 데이터를 입력해주세요',color:T.text3};

}

async function fetchKrPrice(code){
  try{
    const d=await nativeGet('https://m.stock.naver.com/api/stock/'+code+'/basic');
    const p=parseInt((d.closePrice||'').replace(/,/g,''));
    return isNaN(p)?null:p;
  }catch(e){return null;}
}

async function fetchUsPrice(ticker){
  try{
    const d=await nativeGet('https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1d&range=1d');
    return d?.chart?.result?.[0]?.meta?.regularMarketPrice||null;
  }catch(e){return null;}
}

async function fetchUpbitPrices(){
  try{
    const codes=portfolio.holdings.crypto.map(h=>h.upbit).join(',');
    const arr=await nativeGet('https://api.upbit.com/v1/ticker?markets='+codes);
    const m={};arr.forEach(d=>{m[d.market]=d.trade_price;});
    return m;
  }catch(e){return{};}
}

async function updateAllPrices(){
  if(loadingPrice)return;
  loadingPrice=true;logs=['📡 가격 업데이트 시작...'];render();

  let updated=0;

  // 국내주식
  for(const h of portfolio.holdings.kr_stocks){
    logs=[...logs,'조회: '+h.name];render();
    const p=await fetchKrPrice(h.code);
    if(p){h.cur=p;updated++;}
  }
  // 국내ETF
  for(const h of portfolio.holdings.kr_etfs){
    logs=[...logs,'조회: '+h.name];render();
    const p=await fetchKrPrice(h.code);
    if(p){h.cur=p;updated++;}
  }
  // 금광물 (KRX)
  for(const h of portfolio.holdings.gold){
    if(h.code){
      const p=await fetchKrPrice(h.code);
      if(p){h.cur=p;updated++;}
    }
  }
  // 해외주식·ETF
  for(const h of portfolio.holdings.us){
    logs=[...logs,'조회: '+h.ticker];render();
    const p=await fetchUsPrice(h.ticker);
    if(p){h.cur=p;updated++;}
  }
  // 채권
  for(const h of portfolio.holdings.bonds){
    const p=await fetchUsPrice(h.ticker);
    if(p){h.curKRW=Math.round(p*portfolio.exRate);updated++;}
  }
  // 코인
  const upbitMap=await fetchUpbitPrices();
  for(const h of portfolio.holdings.crypto){
    if(upbitMap[h.upbit]){h.cur=upbitMap[h.upbit];updated++;}
  }
  // 워치리스트
  for(const h of portfolio.holdings.watchlist){
    if(h.usd&&h.ticker){const p=await fetchUsPrice(h.ticker);if(p){h.cur=p;updated++;}}
    else if(h.code){const p=await fetchKrPrice(h.code);if(p){h.cur=p;updated++;}}
  }

  portfolio.lastUpdated=new Date().toISOString().slice(0,10);
  Store.set('porto',JSON.stringify(portfolio));
  logs=['✅ '+updated+'개 종목 업데이트 완료 ('+new Date().toTimeString().slice(0,5)+')'];
  loadingPrice=false;render();
  setTimeout(()=>{logs=[];render();},3000);
}

async function searchKrStock(q){
  try{
    const d=await nativeGet('https://ac.finance.naver.com/ac?q='+encodeURIComponent(q)+'&q_enc=UTF-8&st=111&t_korename=1&limit=8');
    if(!d.items)return[];
    return d.items.map(it=>({code:it[0],name:it[1],market:it[6]||'KRX',type:'kr'}));
  }catch(e){return[];}
}

async function searchUsStock(q){
  try{
    const d=await nativeGet('https://query2.finance.yahoo.com/v1/finance/search?q='+encodeURIComponent(q)+'&quotesCount=8&newsCount=0&enableFuzzyQuery=false');
    if(!d.quotes)return[];
    return d.quotes.filter(x=>x.quoteType==='EQUITY'||x.quoteType==='ETF').slice(0,8)
      .map(x=>({ticker:x.symbol,name:x.shortname||x.longname||x.symbol,exchange:x.exchange,type:'us'}));
  }catch(e){return[];}
}

    ${card(`<div style="text-align:center">
      <div style="font-size:14px;font-weight:700;color:${T.text}">포트폴리오 v2.0</div>
      <div style="font-size:11px;color:${T.text3};margin-top:4px">최종 업데이트: ${portfolio.lastUpdated}</div>
      <button onclick="resetPortfolio()" style="margin-top:12px;padding:8px 16px;background:${T.red}22;color:${T.red};border-radius:8px;font-size:12px">⚠ 초기화</button>
    </div>`)}
  </div>`;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function updateSwitch(key,ym,val){
  const idx=portfolio.switching[key].findIndex(d=>d.ym===ym);
  if(idx>=0)portfolio.switching[key][idx].val=val===''?null:parseFloat(val);
  Store.set('porto',JSON.stringify(portfolio));
  // 신호 표시만 업데이트
  render();
}

function addSwitchMonth(key){
  const data=portfolio.switching[key];
  const last=data[data.length-1].ym;
  const [y,m]=last.split('-').map(Number);
  const nm=m===12?1:m+1,ny=m===12?y+1:y;
  const newYm=ny+'-'+(nm<10?'0':'')+nm;
  if(!data.find(d=>d.ym===newYm))data.push({ym:newYm,val:null});
  Store.set('porto',JSON.stringify(portfolio));
  render();
}

function removeSwitchMonth(key){
  if(portfolio.switching[key].length>4)portfolio.switching[key].pop();
  Store.set('porto',JSON.stringify(portfolio));
  render();
}

function deleteHolding(cat,id){
  if(cat==='kr'){
    portfolio.holdings.kr_stocks=portfolio.holdings.kr_stocks.filter(h=>h.id!==id);
    portfolio.holdings.kr_etfs=portfolio.holdings.kr_etfs.filter(h=>h.id!==id);
  }else if(cat==='us')portfolio.holdings.us=portfolio.holdings.us.filter(h=>h.id!==id);
  else if(cat==='bonds')portfolio.holdings.bonds=portfolio.holdings.bonds.filter(h=>h.id!==id);
  else if(cat==='alts'){
    portfolio.holdings.gold=portfolio.holdings.gold.filter(h=>h.id!==id);
    portfolio.holdings.crypto=portfolio.holdings.crypto.filter(h=>h.id!==id);
  }else if(cat==='watch')portfolio.holdings.watchlist=portfolio.holdings.watchlist.filter(h=>h.id!==id);
  Store.set('porto',JSON.stringify(portfolio));
  render();
}

async function fetchUpbit(){
  try{
    const codes=portfolio.holdings.crypto.map(h=>h.upbit).join(',');
    const arr=await nativeGet('https://api.upbit.com/v1/ticker?markets='+codes);
    const m={};arr.forEach(d=>{m[d.market]=d.trade_price;});
    portfolio.holdings.crypto=portfolio.holdings.crypto.map(h=>({...h,cur:m[h.upbit]??h.cur}));
    Store.set('porto',JSON.stringify(portfolio));
    alert('✅ 업비트 업데이트 완료');render();
  }catch(e){alert('실패: '+e.message);}
}

function saveEx(){
  const v=+document.getElementById('exIn').value;
  if(v>0){portfolio.exRate=v;Store.set('porto',JSON.stringify(portfolio));render();}
}

function saveApiKey(){
  portfolio.apiKey=document.getElementById('apiKeyIn').value.trim();
  Store.set('porto',JSON.stringify(portfolio));
  alert('API 키가 저장되었습니다.');
}

function resetPortfolio(){
  if(confirm('정말 초기화하시겠습니까? 모든 데이터가 삭제됩니다.')){
    portfolio=JSON.parse(JSON.stringify(INIT));
    Store.set('porto',JSON.stringify(portfolio));
    render();
  }
}

async function handlePhotoImport(input){
  if(!input.files||!input.files[0])return;
  if(!portfolio.apiKey){alert('먼저 Claude API 키를 설정해주세요.');return;}
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=async e=>{
    const b64=e.target.result.split(',')[1];
    const mt=file.type||'image/jpeg';
    showModal(`<div class="sheet-handle"></div>
      <div style="font-size:16px;font-weight:700;color:${T.text};margin-bottom:12px">📷 사진 분석 중...</div>
      <div class="pulse" style="font-size:13px;color:${T.text2}">AI가 종목 정보를 추출하고 있습니다...</div>`);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':portfolio.apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mt,data:b64}},
          {type:'text',text:'이 이미지는 증권 앱 보유종목 화면입니다. 종목명, 코드/티커, 보유수량, 평균단가(평균매수가)를 추출해서 JSON 배열만 반환하세요. 형식: [{"name":"종목명","code":"코드또는티커","qty":수량,"avg":평균단가,"isKr":true}]. 국내주식은 isKr:true, 해외는 false. JSON만 반환, 다른 텍스트 없이.'}
        ]}]})
      });
      const data=await res.json();
      const text=data.content[0].text.replace(/```json|```/g,'').trim();
      const items=JSON.parse(text);
      showStockConfirm(items);
    }catch(e){closeModal();alert('인식 실패: '+e.message);}
  };
  reader.readAsDataURL(file);
}

function showStockConfirm(items){
  showModal(`<div class="sheet-handle"></div>
    <div style="font-size:16px;font-weight:700;color:${T.text};margin-bottom:4px">인식된 종목</div>
    <div style="font-size:12px;color:${T.text3};margin-bottom:16px">기존 종목이면 수량·단가가 업데이트됩니다</div>
    ${items.map((it,i)=>`<div style="background:${T.bg2};border-radius:10px;padding:12px;margin-bottom:8px">
      <div style="font-size:14px;font-weight:700;color:${T.text}">${it.name} <span style="font-size:11px;color:${T.text3}">${it.code}</span></div>
      <div class="mono" style="font-size:13px;color:${T.text2};margin-top:4px">수량 ${it.qty} · 평균단가 ${it.isKr?won(it.avg):usd(it.avg)}</div>
    </div>`).join('')}
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="applyPhotoStocks(${JSON.stringify(items).replace(/"/g,'&quot;')})" class="tap" style="flex:1;padding:13px;background:${T.teal};color:#000;border-radius:12px;font-size:14px;font-weight:700">적용하기</button>
      <button onclick="closeModal()" class="tap" style="flex:1;padding:13px;background:${T.bg3};color:${T.text2};border-radius:12px;font-size:14px">취소</button>
    </div>`);
}

function applyPhotoStocks(items){
  items.forEach(it=>{
    const id='p'+Date.now()+Math.random().toString(36).slice(2,5);
    if(it.isKr){
      const ex=[...portfolio.holdings.kr_stocks,...portfolio.holdings.kr_etfs].find(h=>h.code===it.code||h.name===it.name);
      if(ex){ex.qty=it.qty;ex.avg=it.avg;}
      else portfolio.holdings.kr_stocks.push({id,name:it.name,code:it.code,qty:it.qty,avg:it.avg,cur:it.avg,sector:'기타'});
    }else{
      const ex=portfolio.holdings.us.find(h=>h.ticker===it.code||h.name===it.name);
      if(ex){ex.qty=it.qty;ex.avg=it.avg;}
      else portfolio.holdings.us.push({id,name:it.name,ticker:it.code,qty:it.qty,avg:it.avg,cur:it.avg,tag:'기타'});
    }
  });
  Store.set('porto',JSON.stringify(portfolio));
  closeModal();
  alert('✅ '+items.length+'개 종목이 반영되었습니다.');
  render();
}

// ═══════════════════════════════════════
// ADD STOCK MODAL
// ═══════════════════════════════════════
let searchResults=[];

function showAddModal(cat){
  showModal(`<div class="sheet-handle"></div>
    <div style="font-size:16px;font-weight:700;color:${T.text};margin-bottom:14px">종목 추가 — ${{kr:'국내',us:'해외',bonds:'채권',alts:'대체',watch:'워치리스트'}[cat]}</div>
    <input type="text" id="searchQ" placeholder="종목명 또는 코드/티커 검색" oninput="doSearch('${cat}',this.value)" style="margin-bottom:12px">
    <div id="searchRes" style="max-height:200px;overflow-y:auto;margin-bottom:14px"></div>
    <div id="addForm" style="display:none">
      <div style="background:${T.bg2};border-radius:10px;padding:12px;margin-bottom:12px">
        <div id="selName" style="font-size:14px;font-weight:700;color:${T.teal}"></div>
        <div id="selCode" style="font-size:11px;color:${T.text3};margin-top:2px"></div>
      </div>
      ${cat!=='watch'?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        <div><div style="font-size:12px;color:${T.text3};margin-bottom:5px">수량</div><input type="number" id="addQty" placeholder="0" step="0.0001"></div>
        <div><div style="font-size:12px;color:${T.text3};margin-bottom:5px">평균단가</div><input type="number" id="addAvg" placeholder="0"></div>
      </div>`:''}
      ${btn('추가하기','confirmAdd("'+cat+'")',T.teal)}
    </div>
    <button onclick="closeModal()" class="tap" style="width:100%;padding:12px;background:${T.bg2};color:${T.text2};border-radius:12px;font-size:14px;margin-top:8px">취소</button>`);
}

let searchTimer;
async function doSearch(cat,q){
  clearTimeout(searchTimer);
  if(q.length<1){document.getElementById('searchRes').innerHTML='';return;}
  searchTimer=setTimeout(async()=>{
    document.getElementById('searchRes').innerHTML=`<div style="color:${T.text3};font-size:12px;padding:8px">검색 중...</div>`;
    const isKr=cat==='kr'||cat==='alts'||cat==='watch';
    const isUs=cat==='us'||cat==='bonds';
    let results=[];
    if(isKr||cat==='watch'){const kr=await searchKrStock(q);results=[...results,...kr];}
    if(isUs||cat==='watch'){const us=await searchUsStock(q);results=[...results,...us];}
    searchResults=results;
    document.getElementById('searchRes').innerHTML=results.length===0
      ?`<div style="color:${T.text3};font-size:12px;padding:8px">검색 결과 없음</div>`
      :results.map((r,i)=>`<div onclick="selectStock(${i})" class="tap" style="padding:10px 12px;border-radius:10px;background:${T.bg2};margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:14px;font-weight:600;color:${T.text}">${r.name}</div>
          <div style="font-size:11px;color:${T.text3};margin-top:1px">${r.code||r.ticker} · ${r.market||r.exchange||''}</div>
        </div>
        <span style="font-size:10px;color:${T.teal};background:${T.teal}22;padding:3px 8px;border-radius:20px">${r.type==='kr'?'국내':'해외'}</span>
      </div>`).join('');
  },400);
}

function selectStock(idx){
  const r=searchResults[idx];
  document.getElementById('selName').textContent=r.name;
  document.getElementById('selCode').textContent=(r.code||r.ticker)+' · '+(r.market||r.exchange||'');
  document.getElementById('addForm').style.display='block';
  document.getElementById('addForm').setAttribute('data-idx',idx);
}

function confirmAdd(cat){
  const idx=+document.getElementById('addForm').getAttribute('data-idx');
  const r=searchResults[idx];
  if(!r)return;
  const isWatch=cat==='watch';
  const qty=isWatch?1:parseFloat(document.getElementById('addQty').value)||0;
  const avg=isWatch?0:parseFloat(document.getElementById('addAvg').value)||0;
  const id='n'+Date.now();
  const isKr=r.type==='kr';

  if(cat==='kr'){
    portfolio.holdings.kr_stocks.push({id,name:r.name,code:r.code,qty,avg,cur:avg,sector:'기타'});
  }else if(cat==='us'||cat==='bonds'){
    portfolio.holdings.us.push({id,name:r.name,ticker:r.ticker,qty,avg,cur:avg,tag:'기타'});
  }else if(cat==='watch'){
    portfolio.holdings.watchlist.push({id,name:r.name,code:r.code,ticker:r.ticker,cur:0,usd:!isKr,note:'신규'});
  }else if(cat==='alts'){
    portfolio.holdings.gold.push({id,name:r.name,code:r.code,qty,avg,cur:avg});
  }

  Store.set('porto',JSON.stringify(portfolio));
  closeModal();render();
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function showModal(content){
  document.getElementById('modal-root').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="sheet">${content}</div>
    </div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
const TABS=[{id:'home',ic:'◎',l:'홈'},{id:'holdings',ic:'≡',l:'종목'},{id:'switching',ic:'⇄',l:'스위칭'},{id:'rebal',ic:'⊖',l:'리밸런싱'},{id:'analysis',ic:'↗',l:'분석'},{id:'settings',ic:'◈',l:'설정'}];

function render(){
  let content='';
  if(tab==='home')content=homeScreen();
  else if(tab==='holdings')content=holdingsScreen();
  else if(tab==='switching')content=switchingScreen();
  else if(tab==='rebal')content=rebalScreen();
  else if(tab==='analysis')content=analysisScreen();
  else content=settingsScreen();

  document.getElementById('app').innerHTML=`
  <div style="width:100%;height:100vh;display:flex;flex-direction:column;background:${T.bg};overflow:hidden;position:relative">
    <div style="height:50px;background:${T.bg2};display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;border-bottom:1px solid ${T.border}">
      <span style="font-size:15px;font-weight:800;color:${T.text}">📊 포트폴리오</span>
      <div style="display:flex;gap:8px;align-items:center">
        ${loadingPrice?`<span class="pulse" style="font-size:10px;color:${T.teal}">● LIVE</span>`:''}
        <span class="mono" style="font-size:11px;color:${T.text3}">${portfolio.lastUpdated}</span>
      </div>
    </div>
    ${logs.length?`<div style="position:absolute;top:58px;left:10px;right:10px;z-index:150;background:${T.bg3}EE;border:1px solid ${T.border};border-radius:12px;padding:10px 14px">
      ${logs.map(m=>`<div style="font-size:11px;color:${m.startsWith('✅')?T.green:m.startsWith('❌')?T.red:T.text2};font-family:monospace;margin-bottom:2px">${m}</div>`).join('')}
    </div>`:''}
    <div style="flex:1;overflow:hidden;position:relative">${content}</div>
    <div style="height:62px;background:${T.bg2};border-top:1px solid ${T.border};display:flex;flex-shrink:0">
      ${TABS.map(t=>`<button onclick="tab='${t.id}';render()" class="tap" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:transparent;color:${tab===t.id?T.teal:T.text3};position:relative;padding:4px 0">
        <span style="font-size:18px">${t.ic}</span>
        <span style="font-size:9px;font-weight:${tab===t.id?700:400}">${t.l}</span>
        ${tab===t.id?`<div style="position:absolute;bottom:0;width:24px;height:2px;background:${T.teal};border-radius:1px"></div>`:''}
      </button>`).join('')}
    </div>
  </div>`;
}

render();
</script>
